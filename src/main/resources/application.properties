# Operator
quarkus.application.name=k8s-operator
quarkus.operator-sdk.crd.validate=false
quarkus.operator-sdk.crd.apply=true
quarkus.operator-sdk.generate-csv=false
quarkus.kubernetes.namespace=default

# Kubernetes client - trust-certs is build-time, must be here
quarkus.kubernetes-client.trust-certs=true

# Container image (override at build: -Dquarkus.container-image.tag=...)
quarkus.container-image.registry=
quarkus.container-image.group=com.example
quarkus.container-image.name=k8s-operator
quarkus.container-image.tag=1.0.0-SNAPSHOT

# 대시보드 REST (개발용 — 외부 노출 시 인증·네트워크 정책 권장)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=accept,authorization,content-type,origin
quarkus.http.cors.access-control-max-age=86400
